<script>

    function AddNumber(n1,n2)
    {
        return n1+n2
    }
     total=AddNumber(10,20)+30

     //Anyonymus Function

     Show();
     // call back function
     function Great(CallBack)
     {
        console.log("hello")
        CallBack();

     {
        console.log("good bye")
     }
     Great(Bye)
</script>
